          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════ EDIT SHEET ═══════════════
function EditSheet({c,onClose,onSave,industries,companies}){
  const [f,setF]=useState({...c,tags:c.tags||[]});
  const [tagIn,setTagIn]=useState('');
  const [photos,setPhotos]=useState([]);
  const [newPhotos,setNewPhotos]=useState([]);
  const [ocrStatus,setOcrStatus]=useState(null); // null | 'scanning' | 'done' | 'error'
  const [ocrProgress,setOcrProgress]=useState(0);
  const [duplicates,setDuplicates]=useState([]);
  const cameraRef=useRef();
  const uploadRef=useRef();
  const MAX_PHOTOS=10;

  useEffect(()=>{
    if(c.id){(async()=>{const p=await getCompanyPhotos(c.id);setPhotos(p)})()}
  },[c.id]);

  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  const allPhotos = [...photos, ...newPhotos];

  const compressImage=(file)=>{
    return new Promise((resolve,reject)=>{
      if(!file.type.startsWith('image/')){reject('Not an image');return;}
      if(file.size > MAX_PHOTO_SIZE * 5){reject('Photo too large (max 10MB)');return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        const img=new Image();
        img.onload=()=>{
          const MAX=800;let w=img.width,h=img.height;
          if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w*=r;h*=r}
          const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          const result=canvas.toDataURL('image/jpeg',0.7);
          if(result.length>MAX_PHOTO_SIZE){reject('Compressed photo still too large');return;}
          resolve(result);
        };
        img.onerror=()=>reject('Invalid image');
        img.src=ev.target.result;
      };
      reader.onerror=()=>reject('Read error');
      reader.readAsDataURL(file);
    });
  };

  const handlePhoto=async(e)=>{
    const files=Array.from(e.target.files);if(!files.length)return;
    const remaining=MAX_PHOTOS-allPhotos.length;
    if(remaining<=0){alert(`Maximum ${MAX_PHOTOS} photos allowed`);return;}
    const toProcess=files.slice(0,remaining);
    const results=[];
    for(const file of toProcess){
      try{const data=await compressImage(file);results.push(data);}catch(err){alert(String(err));}
    }
    if(results.length)setNewPhotos(prev=>[...prev,...results]);
    e.target.value='';
  };

  const removePhoto=(index)=>{
    if(index<photos.length){
      setPhotos(prev=>prev.filter((_,i)=>i!==index));
    } else {
      const newIdx=index-photos.length;
      setNewPhotos(prev=>prev.filter((_,i)=>i!==newIdx));
    }
  };

  const scanPhoto=async(photoData)=>{
    setOcrStatus('scanning');setOcrProgress(0);setDuplicates([]);
    try{
      const text=await extractTextFromImage(photoData,p=>setOcrProgress(Math.round(p*100)));
      const parsed=parseBusinessCard(text);
      // Auto-fill only empty fields
      setF(prev=>{
        const updated={...prev};
        if(!updated.name && parsed.name) updated.name=parsed.name;
        if(!updated.phone && parsed.phone) updated.phone=parsed.phone;
        if(!updated.email && parsed.email) updated.email=parsed.email;
        if(!updated.website && parsed.website) updated.website=parsed.website;
        if(!updated.address && parsed.address) updated.address=parsed.address;
        if(!updated.services && parsed.services) updated.services=parsed.services;
        if(!updated.industry && parsed.industry) updated.industry=parsed.industry;
        if(!updated.notes && parsed.notes) updated.notes=parsed.notes;
        return updated;
      });
      // Check for duplicates
      if(parsed.name || parsed.phone){
        const dupes = findDuplicates(parsed, companies||[]);
        if(dupes.length) setDuplicates(dupes);
      }
      setOcrStatus('done');
      setTimeout(()=>setOcrStatus(null),4000);
    }catch(err){
      setOcrStatus('error');
      setTimeout(()=>setOcrStatus(null),3000);
    }
  };

  const doSave=async()=>{
    if(!f.name.trim()){alert('Company name is required');return;}
    const saved=await dbPut('companies',f);
    const companyId=f.id||saved;
    const finalPhotos=[...photos,...newPhotos];
    if(finalPhotos.length>0||photos.length!==allPhotos.length){
      await dbPut('photos',{companyId,photos:finalPhotos});
    }
    onSave({...f,id:companyId});
  };

  const addTag=()=>{
    const tag = tagIn.trim().slice(0, 50);
    if(tag && !f.tags.includes(tag) && f.tags.length < 20){
      set('tags',[...f.tags,tag]);setTagIn('');
    }
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-header"><h2>{c.id?'Edit Company':'New Company'}</h2><button className="sheet-close" onClick={onClose}>×</button></div>
        <div className="sheet-body">
          <div className="photo-area">
            <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handlePhoto}/>
            <input ref={uploadRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={handlePhoto}/>
            {allPhotos.length>0?(
              <>
                <div className="photo-gallery">
                  {allPhotos.map((p,i)=>(
                    <div key={i} className="photo-thumb-wrap">
                      <img src={p} className="photo-thumb" alt={`Photo ${i+1}`}/>
                      <button type="button" className="photo-thumb-remove" onClick={()=>removePhoto(i)}>×</button>
                    </div>
                  ))}
                </div>
                <div className="photo-count">{allPhotos.length}/{MAX_PHOTOS} photos</div>
                <div className="photo-buttons">
                  <button type="button" className="photo-btn" onClick={()=>cameraRef.current.click()} disabled={allPhotos.length>=MAX_PHOTOS}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    Add Photo
                  </button>
                  <button type="button" className="photo-btn" onClick={()=>uploadRef.current.click()} disabled={allPhotos.length>=MAX_PHOTOS}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Upload More
                  </button>
                </div>
                {ocrStatus===null&&allPhotos.length>0&&(
                  <div style={{marginTop:8}}>
                    <button type="button" className="ocr-btn" onClick={()=>scanPhoto(allPhotos[0])} style={{width:'100%',justifyContent:'center'}}>
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 3h6v6H2z"/><path d="M16 3h6v6h-6z"/><path d="M2 15h6v6H2z"/><path d="M19 15v3a2 2 0 0 1-2 2h-3"/><path d="M15 15h6"/></svg>
                      Scan Card — Auto-fill Fields
                    </button>
                  </div>
                )}
                {ocrStatus==='scanning'&&(
                  <div className="ocr-bar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18" style={{flexShrink:0,animation:'spin 1s linear infinite'}}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                    <div style={{flex:1}}>
                      <div className="ocr-status">Scanning text... {ocrProgress}%</div>
                      <div className="ocr-progress"><div className="ocr-progress-fill" style={{width:ocrProgress+'%'}}/></div>
                    </div>
                  </div>
                )}
                {ocrStatus==='done'&&<div className="ocr-bar" style={{borderColor:'var(--green)',background:'rgba(5,150,105,.08)'}}><span style={{color:'var(--green)',fontWeight:600,fontSize:13}}>Scan complete — empty fields auto-filled</span></div>}
                {ocrStatus==='error'&&<div className="ocr-bar" style={{borderColor:'var(--red)',background:'rgba(220,38,38,.08)'}}><span style={{color:'var(--red)',fontWeight:600,fontSize:13}}>Scan failed — try a clearer photo</span></div>}
                {duplicates.length>0&&<div className="duplicate-bar">{duplicates.map((d,i)=><div key={i} className="duplicate-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>Possible duplicate: <strong>{d.company.name}</strong> ({d.matchType} match, {Math.round(d.score*100)}%)</span></div>)}</div>}
              </>
            ):(
              <>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <p>Add photos</p>
                <div className="hint">Business cards, truck signs, ads — up to {MAX_PHOTOS}</div>
                <div className="photo-buttons">
                  <button type="button" className="photo-btn" onClick={()=>cameraRef.current.click()}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                    Take Photo
                  </button>
                  <button type="button" className="photo-btn" onClick={()=>uploadRef.current.click()}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Upload Photos
                  </button>
                </div>
              </>
            )}
          </div>

          <div className="field"><label>Company Name *</label><input value={f.name} onChange={e=>set('name',e.target.value.slice(0,200))} placeholder="Company name" maxLength={200}/></div>
          <div className="row2">
            <div className="field"><label>Phone</label><input value={f.phone} onChange={e=>set('phone',e.target.value.slice(0,30))} placeholder="Phone" type="tel" maxLength={30}/></div>
            <div className="field"><label>Contact Person</label><input value={f.contact} onChange={e=>set('contact',e.target.value.slice(0,200))} placeholder="Name" maxLength={200}/></div>
          </div>
          <div className="row2">
            <div className="field"><label>Email</label><input value={f.email} onChange={e=>set('email',e.target.value.slice(0,200))} placeholder="Email" type="email" maxLength={200}/></div>
            <div className="field"><label>Website</label><input value={f.website} onChange={e=>set('website',e.target.value.slice(0,500))} placeholder="www..." maxLength={500}/></div>
          </div>
          <div className="field"><label>Industry</label><input list="ind-list" value={f.industry} onChange={e=>set('industry',e.target.value.slice(0,100))} placeholder="Type or select" maxLength={100}/><datalist id="ind-list">{industries.map(i=><option key={i} value={i}/>)}</datalist></div>
          <div className="field"><label>Address</label><input value={f.address} onChange={e=>set('address',e.target.value.slice(0,500))} placeholder="Full address" maxLength={500}/></div>
          <div className="field"><label>Services</label><textarea value={f.services} onChange={e=>set('services',e.target.value.slice(0,2000))} placeholder="What they do..." maxLength={2000}/></div>
          <div className="field"><label>Notes</label><textarea value={f.notes} onChange={e=>set('notes',e.target.value.slice(0,5000))} placeholder="Your personal notes, pricing, etc." maxLength={5000}/></div>
          <div className="row2">
            <div className="field"><label>Rating</label><div className="stars">{[1,2,3,4,5].map(i=><svg key={i} viewBox="0 0 24 24" width="24" height="24" className={`star-icon ${i<=f.rating?'filled':''}`} fill={i<=f.rating?'currentColor':'none'} stroke="currentColor" strokeWidth="2" onClick={()=>set('rating',i===f.rating?0:i)}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>)}</div></div>
            <div className="field"><label>Tags ({f.tags.length}/20)</label><div style={{display:'flex',gap:4}}><input value={tagIn} onChange={e=>setTagIn(e.target.value.slice(0,50))} placeholder="Add tag" maxLength={50} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addTag()}}} style={{flex:1}}/><button className="btn btn-secondary" onClick={addTag} style={{width:'auto',padding:'8px 12px',fontSize:13}}>+</button></div>
            <div className="card-tags" style={{marginTop:6}}>{f.tags.map(t=><span key={t} className="tag" style={{cursor:'pointer',fontSize:12,padding:'3px 8px'}} onClick={()=>set('tags',f.tags.filter(x=>x!==t))}>{t} ×</span>)}</div></div>
          </div>
          <button className="btn btn-primary" onClick={doSave} style={{marginTop:8}}>{c.id?'Save Changes':'Add Company'}</button>
          <button className="btn btn-secondary" onClick={onClose} style={{marginTop:8}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════ BATCH SCAN SHEET ═══════════════
function BatchScanSheet({onClose,companies,onComplete}){
  const [step,setStep]=useState('upload'); // upload | scanning | results
  const [photoFiles,setPhotoFiles]=useState([]);
  const [results,setResults]=useState([]); // [{photo,parsed,duplicates,selected,expanded,status:'new'|'duplicate'|'skip'}]
  const [scanIdx,setScanIdx]=useState(0);
  const [scanProgress,setScanProgress]=useState(0);
  const [saving,setSaving]=useState(false);
  const cameraRef=useRef();
  const uploadRef=useRef();

  const compressImage=(file)=>{
    return new Promise((resolve,reject)=>{
      if(!file.type.startsWith('image/')){reject('Not an image');return;}
      if(file.size > MAX_PHOTO_SIZE * 5){reject('Photo too large');return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        const img=new Image();
        img.onload=()=>{
          const MAX=800;let w=img.width,h=img.height;
          if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w*=r;h*=r}
          const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          resolve(canvas.toDataURL('image/jpeg',0.7));
        };
        img.onerror=()=>reject('Invalid image');
        img.src=ev.target.result;
      };
      reader.onerror=()=>reject('Read error');
      reader.readAsDataURL(file);
    });
  };

  const handlePhotos=async(e)=>{
    const files=Array.from(e.target.files);if(!files.length)return;
    const compressed=[];
    for(const file of files){
      try{const data=await compressImage(file);compressed.push(data);}catch(err){}
    }
    setPhotoFiles(prev=>[...prev,...compressed]);
    e.target.value='';
  };

  const removePhoto=(idx)=>setPhotoFiles(prev=>prev.filter((_,i)=>i!==idx));

  const startScan=async()=>{
    if(!photoFiles.length) return;
    setStep('scanning');
    const scanResults=[];
    for(let i=0;i<photoFiles.length;i++){
      setScanIdx(i);setScanProgress(0);
      try{
        const text=await extractTextFromImage(photoFiles[i],p=>setScanProgress(Math.round(p*100)));
        const parsed=parseBusinessCard(text);
        const dupes=findDuplicates(parsed, companies||[]);
        scanResults.push({
          photo:photoFiles[i],
          parsed,
          duplicates:dupes,
          selected:true,
          expanded:false,
          status:dupes.length>0?'duplicate':'new',
          edited:{...parsed}
        });
      }catch(err){
        scanResults.push({
          photo:photoFiles[i],
          parsed:{},
          duplicates:[],
          selected:true,
          expanded:false,
          status:'new',
          edited:{}
        });
      }
    }
    setResults(scanResults);
    setStep('results');
  };

  const toggleSelect=(idx)=>setResults(prev=>prev.map((r,i)=>i===idx?{...r,selected:!r.selected}:r));
  const toggleExpand=(idx)=>setResults(prev=>prev.map((r,i)=>i===idx?{...r,expanded:!r.expanded}:r));
  const updateField=(idx,key,val)=>setResults(prev=>prev.map((r,i)=>i===idx?{...r,edited:{...r.edited,[key]:val}}:r));
  const setStatus=(idx,status)=>setResults(prev=>prev.map((r,i)=>i===idx?{...r,status,selected:status!=='skip'}:r));

  const saveAll=async()=>{
    setSaving(true);
    let count=0;
    for(const r of results){
      if(!r.selected || r.status==='skip') continue;
      const data={
        name:r.edited.name||'',contact:'',phone:r.edited.phone||'',
        email:r.edited.email||'',website:r.edited.website||'',
        address:r.edited.address||'',services:r.edited.services||'',
        industry:r.edited.industry||'',rating:0,
        notes:r.edited.notes||'',tags:[],createdAt:Date.now()
      };
      if(!data.name.trim()) continue;
      const validated=validateCompany(data);
      if(!validated) continue;

      if(r.status==='duplicate' && r.duplicates.length>0){
        // Merge: update existing company with new fields that it's missing
        const existing=r.duplicates[0].company;
        const merged={...existing};
        if(!merged.phone && validated.phone) merged.phone=validated.phone;
        if(!merged.email && validated.email) merged.email=validated.email;
        if(!merged.website && validated.website) merged.website=validated.website;
        if(!merged.address && validated.address) merged.address=validated.address;
        if(!merged.services && validated.services) merged.services=validated.services;
        if(!merged.industry && validated.industry) merged.industry=validated.industry;
        if(validated.notes && !merged.notes?.includes(validated.notes)) merged.notes=(merged.notes?merged.notes+'; ':'')+validated.notes;
        await dbPut('companies',merged);
        // Add photo to existing
        const existPhotos=await getCompanyPhotos(existing.id);
        await dbPut('photos',{companyId:existing.id,photos:[...existPhotos,r.photo]});
        count++;
      } else {
        // New entry
        const saved=await dbPut('companies',validated);
        const companyId=validated.id||saved;
        await dbPut('photos',{companyId,photos:[r.photo]});
        count++;
      }
    }
    setSaving(false);
    onComplete(count);
  };

  const selectedCount=results.filter(r=>r.selected && r.status!=='skip').length;

  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet batch-sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-header">
          <h2>{step==='upload'?'Batch Scan':step==='scanning'?'Scanning...':'Scan Results'}</h2>
          <button className="sheet-close" onClick={onClose}>×</button>
        </div>
        <div className="sheet-body">

          {step==='upload'&&(
            <>
              <p style={{fontSize:14,color:'var(--muted)',marginBottom:12}}>Upload photos of different contractors. Each photo will be scanned and create a separate entry.</p>
              <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handlePhotos}/>
              <input ref={uploadRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={handlePhotos}/>

              {photoFiles.length>0&&(
                <div className="photo-gallery" style={{marginBottom:12}}>
                  {photoFiles.map((p,i)=>(
                    <div key={i} className="photo-thumb-wrap">
                      <img src={p} className="photo-thumb" alt={`Photo ${i+1}`}/>
                      <button type="button" className="photo-thumb-remove" onClick={()=>removePhoto(i)}>×</button>
                    </div>
                  ))}
                </div>
              )}

              <div className="photo-buttons" style={{marginBottom:12}}>
                <button type="button" className="photo-btn" onClick={()=>cameraRef.current.click()}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  Take Photo
                </button>
                <button type="button" className="photo-btn" onClick={()=>uploadRef.current.click()}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  Upload Photos
                </button>
              </div>

              {photoFiles.length>0&&(
                <button className="btn btn-primary" onClick={startScan}>
                  <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M2 3h6v6H2z"/><path d="M16 3h6v6h-6z"/><path d="M2 15h6v6H2z"/><path d="M19 15v3a2 2 0 0 1-2 2h-3"/><path d="M15 15h6"/></svg>
                    Scan {photoFiles.length} Photo{photoFiles.length>1?'s':''}
                  </span>
                </button>
              )}
            </>
          )}

          {step==='scanning'&&(
            <div style={{textAlign:'center',padding:'20px 0'}}>
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" strokeWidth="1.5" style={{animation:'spin 1s linear infinite',marginBottom:12}}>
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
              </svg>
              <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Scanning photo {scanIdx+1} of {photoFiles.length}</div>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>Extracting text... {scanProgress}%</div>
              <div className="ocr-progress" style={{maxWidth:300,margin:'0 auto'}}>
                <div className="ocr-progress-fill" style={{width:scanProgress+'%'}}/>
              </div>
            </div>
          )}

          {step==='results'&&(
            <>
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>
                Found {results.length} contractor{results.length>1?'s':''} — {selectedCount} selected to save
              </div>

              {results.map((r,idx)=>(
                <div key={idx} className={`batch-item ${r.status==='skip'?'batch-skip':''}`}>
                  <div className="batch-item-header" onClick={()=>toggleExpand(idx)}>
                    <input type="checkbox" checked={r.selected && r.status!=='skip'} onChange={()=>toggleSelect(idx)} onClick={e=>e.stopPropagation()} style={{width:18,height:18,flexShrink:0}}/>
                    <img src={r.photo} className="batch-thumb" alt=""/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:14,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.edited.name||'Unknown Company'}</div>
                      <div style={{fontSize:12,color:'var(--muted)'}}>{r.edited.phone||'No phone'}</div>
                    </div>
                    {r.status==='duplicate'&&<span className="batch-badge batch-badge-warn">Duplicate</span>}
                    {r.status==='new'&&<span className="batch-badge batch-badge-new">New</span>}
                    {r.status==='skip'&&<span className="batch-badge batch-badge-skip">Skip</span>}
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16" style={{flexShrink:0,transform:r.expanded?'rotate(180deg)':'',transition:'transform .15s'}}><polyline points="6 9 12 15 18 9"/></svg>
                  </div>

                  {r.expanded&&(
                    <div className="batch-item-body">
                      {r.duplicates.length>0&&(
                        <div className="duplicate-bar" style={{marginBottom:8}}>
                          {r.duplicates.map((d,di)=>(
                            <div key={di} className="duplicate-item">
                              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="14" height="14"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                              <span>Matches: <strong>{d.company.name}</strong> ({d.matchType}, {Math.round(d.score*100)}%)</span>
                            </div>
                          ))}
                          <div style={{display:'flex',gap:6,marginTop:6}}>
                            <button className="batch-action-btn" onClick={()=>setStatus(idx,'duplicate')} style={r.status==='duplicate'?{background:'var(--accent2)',color:'#fff'}:{}}>Merge</button>
                            <button className="batch-action-btn" onClick={()=>setStatus(idx,'new')} style={r.status==='new'?{background:'var(--accent2)',color:'#fff'}:{}}>Add New</button>
                            <button className="batch-action-btn" onClick={()=>setStatus(idx,'skip')} style={r.status==='skip'?{background:'var(--red)',color:'#fff'}:{}}>Skip</button>
                          </div>
                        </div>
                      )}
                      <div className="field"><label>Name</label><input value={r.edited.name||''} onChange={e=>updateField(idx,'name',e.target.value)} placeholder="Company name"/></div>
                      <div className="row2">
                        <div className="field"><label>Phone</label><input value={r.edited.phone||''} onChange={e=>updateField(idx,'phone',e.target.value)}/></div>
                        <div className="field"><label>Email</label><input value={r.edited.email||''} onChange={e=>updateField(idx,'email',e.target.value)}/></div>
                      </div>
                      <div className="row2">
                        <div className="field"><label>Website</label><input value={r.edited.website||''} onChange={e=>updateField(idx,'website',e.target.value)}/></div>
                        <div className="field"><label>Industry</label><input value={r.edited.industry||''} onChange={e=>updateField(idx,'industry',e.target.value)}/></div>
                      </div>
                      <div className="field"><label>Services</label><textarea value={r.edited.services||''} onChange={e=>updateField(idx,'services',e.target.value)} rows={2}/></div>
                      <div className="field"><label>Notes</label><input value={r.edited.notes||''} onChange={e=>updateField(idx,'notes',e.target.value)}/></div>
                    </div>
                  )}
                </div>
              ))}

              <button className="btn btn-primary" onClick={saveAll} disabled={saving||selectedCount===0} style={{marginTop:12}}>
                {saving?'Saving...':`Save ${selectedCount} Contractor${selectedCount>1?'s':''}`}
              </button>
              <button className="btn btn-secondary" onClick={()=>{setStep('upload');setResults([]);}} style={{marginTop:8}}>Back</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════ SERVICE WORKER ═══════════════
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
