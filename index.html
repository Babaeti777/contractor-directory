<style>
:root{--bg:#f5f6f8;--surface:#fff;--border:#e0e3e8;--text:#1a1d23;--muted:#6b7280;--accent:#1e3a5f;--accent2:#2563eb;--accent-light:#e8f0fe;--green:#059669;--yellow:#d97706;--red:#dc2626;--star:#f59e0b;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent}

/* ── Layout ── */
.app{min-height:100vh;display:flex;flex-direction:column}
.header{background:var(--accent);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.header h1{font-size:17px;font-weight:700;flex:1}
.header-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.header-btn:active{background:rgba(255,255,255,.25)}
.header-btn svg{width:20px;height:20px}

.body-wrap{flex:1;padding:12px;max-width:900px;margin:0 auto;width:100%}

/* ── Search ── */
.search-bar{position:relative;margin-bottom:12px}
.search-bar input{width:100%;padding:10px 12px 10px 38px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;background:var(--surface);outline:none}
.search-bar input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.search-bar svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)}

/* ── Filters ── */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── Stats ── */
.stats{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;min-width:100px}
.stat-n{font-size:22px;font-weight:700;color:var(--accent)}
.stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;cursor:pointer;transition:box-shadow .15s}
.card:active{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-name{font-size:15px;font-weight:600;line-height:1.3}
.card-industry{font-size:11px;padding:2px 8px;border-radius:4px;background:#f0f1f3;color:var(--muted);font-weight:500;white-space:nowrap;flex-shrink:0}
.card-detail{font-size:13px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:6px}
.card-detail svg{width:14px;height:14px;flex-shrink:0}
.card-services{font-size:12px;color:var(--muted);margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 6px;border-radius:3px;background:#e8ecf0;color:var(--muted)}
.stars{display:flex;gap:1px}
.star-icon{width:16px;height:16px;color:#d1d5db;cursor:pointer}
.star-icon.filled{color:var(--star)}

/* ── Photo thumbnail in card ── */
.card-photo{width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0;background:#e8ecf0;margin-left:8px}

/* ── FAB ── */
.fab{position:fixed;bottom:24px;right:16px;width:56px;height:56px;border-radius:28px;background:var(--accent2);color:#fff;border:none;box-shadow:0 4px 16px rgba(37,99,235,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:40;transition:transform .15s}
.fab:active{transform:scale(.92)}
.fab svg{width:26px;height:26px}

/* ── Bottom Sheet / Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:#d1d5db;margin:8px auto 4px}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 4px}
.sheet-header h2{font-size:17px;font-weight:700}
.sheet-close{width:32px;height:32px;border-radius:8px;border:none;background:#f1f3f5;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted)}
.sheet-body{padding:8px 16px 24px}

.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.field input,.field textarea,.field select{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none}
.field input:focus,.field textarea:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.btn{padding:12px 20px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .15s;width:100%}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-primary{background:var(--accent2);color:#fff}
.btn-secondary{background:#f1f3f5;color:var(--text)}
.btn-danger{background:var(--red);color:#fff}
.btn-row{display:flex;gap:8px;margin-top:12px}

/* ── Photo upload area ── */
.photo-area{border:2px dashed var(--border);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;transition:border-color .15s;margin-bottom:12px}
.photo-area:hover,.photo-area.active{border-color:var(--accent2)}
.photo-area svg{width:32px;height:32px;color:var(--muted);margin-bottom:6px}
.photo-area p{font-size:13px;color:var(--muted)}
.photo-area .hint{font-size:11px;color:#b0b5be;margin-top:2px}
.photo-preview{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-top:8px}

/* ── Detail view ── */
.detail-photo{width:100%;max-height:220px;object-fit:contain;border-radius:8px;margin-bottom:12px;background:#f0f1f3}
.detail-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f1f3}
.detail-row svg{width:18px;height:18px;color:var(--muted);flex-shrink:0;margin-top:1px}
.detail-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;font-weight:600}
.detail-value{font-size:14px;margin-top:1px}
.detail-value a{color:var(--accent2);text-decoration:none}

/* ── Toast ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1d23;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty h3{font-size:16px;color:var(--text);margin-bottom:4px}
.empty svg{width:48px;height:48px;color:#d1d5db;margin-bottom:12px}

/* ── Export menu ── */
.menu-overlay{position:fixed;inset:0;z-index:110}
.menu{position:absolute;top:48px;right:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.14);min-width:220px;z-index:111;overflow:hidden}
.menu-item{padding:12px 16px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;color:var(--text)}
.menu-item:active{background:#f6f7f9}
.menu-divider{height:1px;background:var(--border)}

/* ── Confirm dialog ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--surface);border-radius:14px;padding:24px;max-width:340px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.confirm-box h3{font-size:16px;margin-bottom:6px}
.confirm-box p{font-size:14px;color:var(--muted);margin-bottom:16px;line-height:1.5}

/* ── Backup banner ── */
.backup-banner{background:var(--accent-light);border:1px solid #c5d5f0;border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--accent)}
.backup-banner button{padding:4px 12px;border-radius:6px;border:1px solid var(--accent2);background:var(--accent2);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.backup-banner .dismiss{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px}

/* ── Error boundary ── */
.error-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;color:var(--text)}
.error-screen h2{font-size:20px;margin-bottom:8px}
.error-screen p{font-size:14px;color:var(--muted);margin-bottom:20px;max-width:400px;line-height:1.5}

/* ── Desktop tweaks ── */
@media(min-width:640px){
  .body-wrap{padding:20px}
  .card{padding:16px}
  .card-name{font-size:16px}
}
</style>

// ═══════════════ ERROR BOUNDARY ═══════════════
class ErrorBoundary extends Component {
  constructor(props){super(props);this.state={hasError:false,error:null}}
  static getDerivedStateFromError(error){return{hasError:true,error}}
  componentDidCatch(error,info){console.error('App crash:',error,info)}
  render(){
    if(this.state.hasError){
      return React.createElement('div',{className:'error-screen'},
        React.createElement('h2',null,'Something went wrong'),
        React.createElement('p',null,'The app ran into an error. Your data is safe in the browser. Try refreshing the page.'),
        React.createElement('button',{className:'btn btn-primary',style:{width:'auto',padding:'12px 32px'},
          onClick:()=>{this.setState({hasError:false,error:null});window.location.reload()}},'Refresh App'),
        React.createElement('p',{style:{marginTop:12,fontSize:12,color:'#999'}},String(this.state.error))
      );
    }
    return this.props.children;
  }
}

// ═══════════════ IndexedDB HELPERS ═══════════════
const DB_NAME='contractor_dir';
const DB_VER=2;
function openDB(){
  return new Promise((ok,fail)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('companies'))db.createObjectStore('companies',{keyPath:'id',autoIncrement:true});
      if(!db.objectStoreNames.contains('photos'))db.createObjectStore('photos',{keyPath:'companyId'});
    };
    req.onsuccess=()=>ok(req.result);
    req.onerror=()=>fail(req.error);
    req.onblocked=()=>fail(new Error('Database is blocked by another tab'));
  });
}
async function dbGetAll(store){const db=await openDB();return new Promise((ok,fail)=>{try{const tx=db.transaction(store,'readonly');const s=tx.objectStore(store);const r=s.getAll();r.onsuccess=()=>{db.close();ok(r.result)};r.onerror=()=>{db.close();fail(r.error)}}catch(e){db.close();fail(e)}})}
async function dbPut(store,val){const db=await openDB();return new Promise((ok,fail)=>{try{const tx=db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.put(val);r.onsuccess=()=>{db.close();ok(r.result)};r.onerror=()=>{db.close();fail(r.error)}}catch(e){db.close();fail(e)}})}
async function dbDelete(store,key){const db=await openDB();return new Promise((ok,fail)=>{try{const tx=db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.delete(key);r.onsuccess=()=>{db.close();ok()};r.onerror=()=>{db.close();fail(r.error)}}catch(e){db.close();fail(e)}})}
async function dbClear(store){const db=await openDB();return new Promise((ok,fail)=>{try{const tx=db.transaction(store,'readwrite');const s=tx.objectStore(store);const r=s.clear();r.onsuccess=()=>{db.close();ok()};r.onerror=()=>{db.close();fail(r.error)}}catch(e){db.close();fail(e)}})}

// ═══════════════ CONFIRM DIALOG ═══════════════
function ConfirmDialog({title,message,onConfirm,onCancel,danger}){
  return(
    <div className="confirm-overlay" onClick={onCancel}>
      <div className="confirm-box" onClick={e=>e.stopPropagation()}>
        <h3>{title}</h3>
        <p>{message}</p>
        <div className="btn-row">
          <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
          <button className={`btn ${danger?'btn-danger':'btn-primary'}`} onClick={onConfirm}>{danger?'Delete':'Confirm'}</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════ MAIN APP ═══════════════
function App(){
  const [companies,setCompanies]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [dbAvailable,setDbAvailable]=useState(true);
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('All');
  const [selected,setSelected]=useState(null);
  const [editing,setEditing]=useState(null);
  const [showMenu,setShowMenu]=useState(false);
  const [toast,setToast]=useState(null);
  const [confirmAction,setConfirmAction]=useState(null);
  const [showBackupBanner,setShowBackupBanner]=useState(false);
  const [saving,setSaving]=useState(false);

  const flash=useCallback(msg=>{setToast(msg);setTimeout(()=>setToast(null),2500)},[]);

  // Check if backup reminder is needed
  const checkBackupReminder=useCallback(()=>{
    try{
      const lastBackup=localStorage.getItem('lastBackupDate');
      if(!lastBackup){setShowBackupBanner(true);return}
      const days=(Date.now()-parseInt(lastBackup))/(1000*60*60*24);
      if(days>=BACKUP_INTERVAL_DAYS)setShowBackupBanner(true);
    }catch(e){}
  },[]);

  useEffect(()=>{
    (async()=>{
      try{
        let data=await dbGetAll('companies');
        if(!data.length){
          for(const c of SEED)await dbPut('companies',{...c,createdAt:Date.now()});
          data=await dbGetAll('companies');
        }
        setCompanies(data);
        setDbAvailable(true);
      }catch(err){
        console.error('DB init error:',err);
        setCompanies(SEED.map((c,i)=>({...c,id:i+1,createdAt:Date.now()})));
        setDbAvailable(false);
        flash('Database unavailable — running in read-only mode');
      }finally{
        setLoaded(true);
        checkBackupReminder();
      }
    })();
  },[]);

  const refresh=useCallback(async()=>{
    try{setCompanies(await dbGetAll('companies'))}
    catch(e){console.error('Refresh failed:',e);flash('Failed to reload data')}
  },[flash]);

  const industries=useMemo(()=>{
    const s=new Set(companies.map(c=>c.industry).filter(Boolean));
    return ['All',...[...s].sort()];
  },[companies]);

  const filtered=useMemo(()=>{
    let list=[...companies];
    if(search){const q=search.toLowerCase();list=list.filter(c=>{
      try{
        return (c.name||'').toLowerCase().includes(q)||(c.services||'').toLowerCase().includes(q)||
        (c.industry||'').toLowerCase().includes(q)||(c.phone||'').includes(q)||
        (c.address||'').toLowerCase().includes(q)||(c.tags||[]).some(t=>t.toLowerCase().includes(q))||
        (c.notes||'').toLowerCase().includes(q)||(c.contact||'').toLowerCase().includes(q)||
        (c.email||'').toLowerCase().includes(q)||(c.website||'').toLowerCase().includes(q)
      }catch(e){return false}
    })}
    if(filter!=='All')list=list.filter(c=>c.industry===filter);
    list.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    return list;
  },[companies,search,filter]);

  const saveCompany=useCallback(async(c)=>{
    await refresh();
    setEditing(null);setSelected(null);
    flash(c.id?'Saved':'Company added');
  },[refresh,flash]);

  const removeCompany=useCallback(async(id)=>{
    try{
      await dbDelete('companies',id);
      try{await dbDelete('photos',id)}catch(e){}
      await refresh();
      setEditing(null);setSelected(null);
      flash('Removed');
    }catch(e){flash('Delete failed — try again')}
  },[refresh,flash]);

  const updateRating=useCallback(async(c,r)=>{
    try{
      await dbPut('companies',{...c,rating:r===c.rating?0:r});
      await refresh();
    }catch(e){flash('Rating update failed')}
  },[refresh,flash]);

  const exportCSV=useCallback(()=>{
    if(!companies.length){flash('No data to export');setShowMenu(false);return}
    try{
      const h=['Name','Contact','Phone','Email','Website','Address','Services','Industry','Rating','Notes','Tags'];
      const rows=companies.map(c=>[c.name,c.contact,c.phone,c.email,c.website,c.address,c.services,c.industry,c.rating,c.notes,(c.tags||[]).join('; ')]);
      const csv=[h,...rows].map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
      const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='contractors_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
      setShowMenu(false);flash('CSV exported');
    }catch(e){flash('Export failed')}
  },[companies,flash]);

  const exportJSON=useCallback(()=>{
    if(!companies.length){flash('No data to export');setShowMenu(false);return}
    try{
      const a=document.createElement('a');
      const exportData={version:APP_VERSION,exportedAt:new Date().toISOString(),companies:companies};
      a.href=URL.createObjectURL(new Blob([JSON.stringify(exportData,null,2)],{type:'application/json'}));
      a.download='contractors_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();
      try{localStorage.setItem('lastBackupDate',String(Date.now()))}catch(e){}
      setShowBackupBanner(false);
      setShowMenu(false);flash('JSON backup exported');
    }catch(e){flash('Export failed')}
  },[companies,flash]);

  const importJSON=useCallback(()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=async e=>{
      const f=e.target.files[0];if(!f)return;
      if(f.size>50*1024*1024){flash('File too large (max 50MB)');return}
      try{
        const txt=await f.text();
        const raw=JSON.parse(txt);
        const data=Array.isArray(raw)?raw:(raw.companies&&Array.isArray(raw.companies)?raw.companies:null);
        if(!data){flash('Invalid format — expected array or {companies:[...]}');return}
        const existing=await dbGetAll('companies');
        const existingNames=new Set(existing.map(x=>(x.name||'').toLowerCase().trim()));
        let imported=0;
        for(const c of data){
          if(existingNames.has((c.name||'').toLowerCase().trim()))continue;
          delete c.id;await dbPut('companies',{...c,createdAt:Date.now()});imported++;
        }
        await refresh();
        const skipped=data.length-imported;
        flash(`Imported ${imported} companies${skipped?' ('+skipped+' duplicates skipped)':''}`);
      }catch(err){flash('Import failed: '+err.message)}
    };inp.click();setShowMenu(false);
  },[refresh,flash]);

  const resetToSeed=useCallback(()=>{
    setConfirmAction({
      title:'Reset All Data?',
      message:'This will delete all your companies, ratings, notes, and photos, then reload the original 63 contractors. This cannot be undone. Export a backup first!',
      danger:true,
      onConfirm:async()=>{
        try{
          await dbClear('companies');
          await dbClear('photos');
          for(const c of SEED)await dbPut('companies',{...c,createdAt:Date.now()});
          await refresh();
          flash('Reset to original data');
        }catch(e){flash('Reset failed: '+e.message)}
        setConfirmAction(null);
      }
    });
    setShowMenu(false);
  },[refresh,flash]);

  if(!loaded)return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--muted)'}}>Loading...</div>;

  return(
    <div className="app">
      <div className="header">
        <h1>Contractor Directory</h1>
        <div style={{position:'relative'}}>
          <button className="header-btn" onClick={()=>setShowMenu(!showMenu)}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
          {showMenu&&<><div className="menu-overlay" onClick={()=>setShowMenu(false)}/><div className="menu">
            <div className="menu-item" onClick={exportCSV}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export CSV</div>
            <div className="menu-item" onClick={exportJSON}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export JSON Backup</div>
            <div className="menu-divider"/>
            <div className="menu-item" onClick={importJSON}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Import JSON</div>
            <div className="menu-divider"/>
            <div className="menu-item" style={{color:'var(--red)'}} onClick={resetToSeed}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Reset to Original Data</div>
          </div></>}
        </div>
      </div>

      <div className="body-wrap">
        {!dbAvailable&&<div className="backup-banner" style={{background:'#fef2f2',borderColor:'#fecaca',color:'var(--red)'}}>Database unavailable — read-only mode. Try refreshing.</div>}

        {showBackupBanner&&dbAvailable&&<div className="backup-banner">
          <span style={{flex:1}}>Back up your data to avoid losing changes</span>
          <button onClick={exportJSON}>Backup Now</button>
          <span className="dismiss" onClick={()=>{setShowBackupBanner(false);try{localStorage.setItem('lastBackupDate',String(Date.now()))}catch(e){}}}>×</span>
        </div>}

        <div className="stats">
          <div className="stat"><div className="stat-n">{companies.length}</div><div className="stat-l">Total</div></div>
          <div className="stat"><div className="stat-n">{filtered.length}</div><div className="stat-l">Showing</div></div>
          <div className="stat"><div className="stat-n">{industries.length-1}</div><div className="stat-l">Industries</div></div>
          <div className="stat"><div className="stat-n">{companies.filter(c=>c.rating>=4).length}</div><div className="stat-l">Top Rated</div></div>
        </div>

        <div className="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input placeholder="Search name, service, tag, location..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>

        <div className="filter-row">
          {industries.map(i=><div key={i} className={`chip ${filter===i?'active':''}`} onClick={()=>setFilter(filter===i?'All':i)}>{i==='All'?`All (${companies.length})`:i}</div>)}
        </div>

        {filtered.length===0?(
          <div className="empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>
            <h3>No companies found</h3>
            <p>Try a different search or filter</p>
          </div>
        ):(
          filtered.map(c=><CompanyCard key={c.id} c={c} onClick={()=>setSelected(c)} onRate={(r)=>updateRating(c,r)}/>)
        )}
      </div>

      {dbAvailable&&<button className="fab" onClick={()=>setEditing({name:'',contact:'',phone:'',email:'',website:'',address:'',services:'',industry:'',rating:0,notes:'',tags:[],createdAt:Date.now()})}>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>}

      {selected&&<DetailSheet c={selected} onClose={()=>setSelected(null)} onEdit={()=>{setEditing(selected);setSelected(null)}} onDelete={id=>{
        setConfirmAction({title:'Delete Company?',message:'This will permanently remove this contractor and any attached photo. This cannot be undone.',danger:true,
          onConfirm:()=>{removeCompany(id);setConfirmAction(null)}});
      }} dbAvailable={dbAvailable}/>}
      {editing&&<EditSheet c={editing} onClose={()=>setEditing(null)} onSave={saveCompany} industries={industries.filter(i=>i!=='All')} flash={flash}/>}
      {toast&&<div className="toast">{toast}</div>}
      {confirmAction&&<ConfirmDialog title={confirmAction.title} message={confirmAction.message} danger={confirmAction.danger} onConfirm={confirmAction.onConfirm} onCancel={()=>setConfirmAction(null)}/>}
    </div>
  );
}

// ═══════════════ COMPANY CARD ═══════════════
function CompanyCard({c,onClick,onRate}){
  const [photo,setPhoto]=useState(null);
  useEffect(()=>{setPhoto(null);let mounted=true;(async()=>{try{const p=await dbGetAll('photos');const m=p.find(x=>x.companyId===c.id);if(mounted&&m)setPhoto(m.data)}catch(e){}})();return()=>{mounted=false}},[c.id]);
  return(
    <div className="card" onClick={onClick}>
      <div className="card-top">
        <div style={{flex:1}}>
          <div className="card-name">{c.name||'(No Name)'}</div>
          {c.contact&&<div style={{fontSize:12,color:'var(--muted)',marginTop:1}}>{c.contact}</div>}
        </div>
        <span className="card-industry">{c.industry||'Other'}</span>
        {photo&&<img src={photo} className="card-photo" alt=""/>}
      </div>
      {c.phone&&<div className="card-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 11.042 11.042 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg><a href={"tel:"+c.phone.replace(/[^0-9+]/g,'')} onClick={e=>e.stopPropagation()} style={{color:'var(--accent2)',textDecoration:'none'}}>{c.phone}</a></div>}
      {c.services&&<div className="card-services">{c.services}</div>}
      <div className="card-footer">
        <div className="card-tags">{(c.tags||[]).slice(0,4).map((t,i)=><span key={t+i} className="tag">{t}</span>)}</div>
        <div className="stars" onClick={e=>e.stopPropagation()}>
          {[1,2,3,4,5].map(i=><svg key={i} viewBox="0 0 24 24" width="16" height="16" className={`star-icon ${i<=c.rating?'filled':''}`} fill={i<=c.rating?'currentColor':'none'} stroke="currentColor" strokeWidth="2" onClick={e=>{e.stopPropagation();onRate(i)}}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>)}
        </div>
      </div>
    </div>
  );
}

// ═══════════════ DETAIL SHEET ═══════════════
function DetailSheet({c,onClose,onEdit,onDelete,dbAvailable}){
  const [photo,setPhoto]=useState(null);
  useEffect(()=>{setPhoto(null);let mounted=true;(async()=>{try{const p=await dbGetAll('photos');const m=p.find(x=>x.companyId===c.id);if(mounted&&m)setPhoto(m.data)}catch(e){}})();return()=>{mounted=false}},[c.id]);
  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-header"><h2>{c.name}</h2><button className="sheet-close" onClick={onClose}>×</button></div>
        <div className="sheet-body">
          {photo&&<img src={photo} className="detail-photo" alt="Business card"/>}
          {c.contact&&<div className="detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><div><div className="detail-label">Contact</div><div className="detail-value">{c.contact}</div></div></div>}
          {c.phone&&<div className="detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 11.042 11.042 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg><div><div className="detail-label">Phone</div><div className="detail-value"><a href={"tel:"+c.phone.replace(/[^0-9+]/g,'')}>{c.phone}</a></div></div></div>}
          {c.email&&<div className="detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><div><div className="detail-label">Email</div><div className="detail-value"><a href={"mailto:"+c.email}>{c.email}</a></div></div></div>}
          {c.website&&<div className="detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><div><div className="detail-label">Website</div><div className="detail-value"><a href={(c.website.startsWith('http')?'':'https://')+c.website} target="_blank" rel="noopener">{c.website}</a></div></div></div>}
          {c.address&&<div className="detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><div><div className="detail-label">Address</div><div className="detail-value">{c.address}</div></div></div>}
          {c.services&&<div className="detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg><div><div className="detail-label">Services</div><div className="detail-value">{c.services}</div></div></div>}
          {c.notes&&<div className="detail-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><div><div className="detail-label">Notes</div><div className="detail-value">{c.notes}</div></div></div>}
          {(c.tags||[]).length>0&&<div style={{marginTop:8}}><div className="card-tags">{c.tags.map((t,i)=><span key={t+i} className="tag" style={{fontSize:12,padding:'3px 10px'}}>{t}</span>)}</div></div>}
          <div className="btn-row" style={{marginTop:16}}>
            {dbAvailable&&<button className="btn btn-danger" style={{flex:0,padding:'10px 16px'}} onClick={()=>onDelete(c.id)}>Delete</button>}
            <div style={{flex:1}}/>
            <button className="btn btn-secondary" onClick={onClose} style={{flex:0,padding:'10px 20px'}}>Close</button>
            {dbAvailable&&<button className="btn btn-primary" onClick={onEdit} style={{flex:0,padding:'10px 20px'}}>Edit</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════ EDIT SHEET ═══════════════
function EditSheet({c,onClose,onSave,industries,flash}){
  const [f,setF]=useState({...c,tags:c.tags||[]});
  const [tagIn,setTagIn]=useState('');
  const [photoData,setPhotoData]=useState(null);
  const [existingPhoto,setExistingPhoto]=useState(null);
  const [saving,setSaving]=useState(false);
  const fileRef=useRef();

  useEffect(()=>{
    if(c.id){(async()=>{try{const p=await dbGetAll('photos');const m=p.find(x=>x.companyId===c.id);if(m)setExistingPhoto(m.data)}catch(e){}})()}
  },[c.id]);

  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  const handlePhoto=e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>10*1024*1024){alert('Image must be under 10MB');e.target.value='';return}
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=800;let w=img.width,h=img.height;
        if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w*=r;h*=r}
        const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        setPhotoData(canvas.toDataURL('image/jpeg',0.7));
      };
      img.onerror=()=>{flash('Could not read image');};
      img.src=ev.target.result;
    };
    reader.onerror=()=>{flash('Failed to read file')};
    reader.readAsDataURL(file);
  };

  const doSave=async()=>{
    if(!f.name||!f.name.trim()){flash('Company name is required');return}
    if(saving)return;
    setSaving(true);
    try{
      const saved=await dbPut('companies',f);
      const companyId=f.id||saved;
      if(photoData)await dbPut('photos',{companyId,data:photoData});
      onSave({...f,id:companyId});
    }catch(e){
      flash('Save failed: '+e.message);
    }finally{setSaving(false)}
  };

  const addTag=()=>{if(tagIn.trim()&&!f.tags.includes(tagIn.trim())){set('tags',[...f.tags,tagIn.trim()]);setTagIn('')}};

  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-header"><h2>{c.id?'Edit Company':'New Company'}</h2><button className="sheet-close" onClick={onClose}>×</button></div>
        <div className="sheet-body">
          <div className="photo-area" onClick={()=>fileRef.current&&fileRef.current.click()}>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handlePhoto}/>
            {photoData||existingPhoto?(
              <img src={photoData||existingPhoto} className="photo-preview" alt="Card photo"/>
            ):(
              <>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <p>Tap to take photo or upload</p>
                <div className="hint">Snap a business card, truck sign, or ad</div>
              </>
            )}
          </div>

          <div className="field"><label>Company Name *</label><input value={f.name} onChange={e=>set('name',e.target.value)} placeholder="Company name"/></div>
          <div className="row2">
            <div className="field"><label>Phone</label><input value={f.phone} onChange={e=>set('phone',e.target.value)} placeholder="Phone" type="tel"/></div>
            <div className="field"><label>Contact Person</label><input value={f.contact} onChange={e=>set('contact',e.target.value)} placeholder="Name"/></div>
          </div>
          <div className="row2">
            <div className="field"><label>Email</label><input value={f.email} onChange={e=>set('email',e.target.value)} placeholder="Email" type="email"/></div>
            <div className="field"><label>Website</label><input value={f.website} onChange={e=>set('website',e.target.value)} placeholder="www..."/></div>
          </div>
          <div className="field"><label>Industry</label><input list="ind-list" value={f.industry} onChange={e=>set('industry',e.target.value)} placeholder="Type or select"/><datalist id="ind-list">{industries.map(i=><option key={i} value={i}/>)}</datalist></div>
          <div className="field"><label>Address</label><input value={f.address} onChange={e=>set('address',e.target.value)} placeholder="Full address"/></div>
          <div className="field"><label>Services</label><textarea value={f.services} onChange={e=>set('services',e.target.value)} placeholder="What they do..."/></div>
          <div className="field"><label>Notes</label><textarea value={f.notes} onChange={e=>set('notes',e.target.value)} placeholder="Your personal notes, pricing, etc."/></div>
          <div className="row2">
            <div className="field"><label>Rating</label><div className="stars">{[1,2,3,4,5].map(i=><svg key={i} viewBox="0 0 24 24" width="24" height="24" className={`star-icon ${i<=f.rating?'filled':''}`} fill={i<=f.rating?'currentColor':'none'} stroke="currentColor" strokeWidth="2" onClick={()=>set('rating',i===f.rating?0:i)}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>)}</div></div>
            <div className="field"><label>Tags</label><div style={{display:'flex',gap:4}}><input value={tagIn} onChange={e=>setTagIn(e.target.value)} placeholder="Add tag" onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addTag()}}} style={{flex:1}}/><button className="btn btn-secondary" onClick={addTag} style={{width:'auto',padding:'8px 12px',fontSize:13}}>+</button></div>
            <div className="card-tags" style={{marginTop:6}}>{f.tags.map((t,i)=><span key={t+i} className="tag" style={{cursor:'pointer',fontSize:12,padding:'3px 8px'}} onClick={()=>set('tags',f.tags.filter(x=>x!==t))}>{t} ×</span>)}</div></div>
          </div>
          <button className="btn btn-primary" onClick={doSave} disabled={saving} style={{marginTop:8}}>{saving?'Saving...':(c.id?'Save Changes':'Add Company')}</button>
          <button className="btn btn-secondary" onClick={onClose} disabled={saving} style={{marginTop:8}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════ SERVICE WORKER ═══════════════
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

// ═══════════════ RENDER WITH ERROR BOUNDARY ═══════════════
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);
</script>
</body>
